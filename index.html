    flex-wrap: wrap;

    justify-content: center;
  }

    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 15px;
    width: 250px;
    transition: 0.3s;
  }

  .card:hover {
    border-color: #c8a2ff;
    transform: translateY(-5px);
  }

  .card a {
    text-decoration: none;
    color: inherit;
  }

  h2 {
    margin: 10px 0;
    font-size: 18px;
    font-weight: normal;
  }

  img {
    width: 100%;
    border-radius: 8px;
  }

  p {
    font-size: 14px;
    color: #aaa;
  }

</style>

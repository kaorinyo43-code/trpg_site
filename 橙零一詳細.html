<!DOCTYPE html>
<style>
  body {
    background: #111; /* 黒寄りグレー */
    color: #ddd;
    font-family: "Yu Gothic", "Meiryo", sans-serif;
    padding: 20px;
  }

  h1 {
    text-align: center;
    color: #c8a2ff; /* 淡い紫 */
    margin-bottom: 40px;
    font-weight: normal;
  }

  .container {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
  }

  .card {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 15px;
    width: 250px;
    transition: 0.3s;
  }

  .card:hover {
    border-color: #c8a2ff;
    transform: translateY(-5px);
  }

  .card a {
    text-decoration: none;
    color: inherit;
  }

  h2 {
    margin: 10px 0;
    font-size: 18px;
    font-weight: normal;
  }

  img {
    width: 100%;
    border-radius: 8px;
  }

  p {
    font-size: 14px;
    color: #aaa;
  }

</style>

</head>
<body>

<h1>橙零一</h1>

<img src="立ち絵/橙零一.png" alt="橙零一" width="350">

</html>
